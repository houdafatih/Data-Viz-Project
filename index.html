<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8"/>
    <title>Beyond The Box Score</title>
    <link rel="stylesheet" href="style.css" >
  </head> 
  <body>
     <h1>Beyond The Box Score : Exploring NBA Player Momentum from Game to Game</h1>
     
     <div class="selection">
        <select id="playerSelect">
            <option selected disabled>Select a Player</option>
        </select>

        <select id="seasonSelect">
            <option selected disabled>Select a Season</option>
        </select>

        <select id="metricSelect">
            <option selected disabled>Select a metric</option>
            <option value="pts">Points</option>
            <option value="fga">FGA</option>
            <option value="min">Minutes</option>
            <option value="fg_pct">FG%</option>
            <option value="plus_minus">Plus/Minus</option>
        </select>
     </div>
     
     <h3>Visualization 1 — Season Momentum Timeline</h3>
     <div id="vizual1"></div>

     <h3>Visualization 2 — Next-Game Response View</h3>
     <div class="selection">
        <select id="performanceSelect">
            <option selected disabled>Select event type</option>
            <option value="all">All</option>
            <option value="hot">Hot</option>
            <option value="cold">Cold</option>
            <option value="normal">Normal</option>
        </select>
     </div>
     <div id="vizual2"></div>

     <h3>Visualization 3 — Hot/Cold Streak Explorer</h3>
     <div class="selection">
        <select id="metricSelectV3">
            <option selected disabled>Select a metric</option>
            <option value="pts">Points</option>
            <option value="fga">FGA</option>
            <option value="min">Minutes</option>
            <option value="fg_pct">FG%</option>
            <option value="plus_minus">Plus/Minus</option>
        </select>
        <select id="thresholdSelect">
        <option selected disabled>Select a threshold</option>
            <option value="loose">Loose</option>
            <option value="medium">Medium</option>
            <option value="strict">Strict</option>
        </select>
     </div>        
     <div id="vizual3"></div>


     <h3>Visualization 4 — Context Impact View</h3>
     <div class="selection">
        <select id="contextSelectV4">
            <option selected disabled>Select context</option>
            <option value="home_away">Home vs Away</option>
            <option value="wl">Win vs Loss</option>
            <option value="plus_minus_group">Plus/Minus Group</option>
            <option value="result_streak_type">Team Streak Type</option>
        </select>
        <select id="xMetricSelectV4">
            <option selected disabled>Select x-axis</option>
            <option value="pts_diff_from_baseline">PTS Difference from Baseline</option>
            <option value="plus_minus">Plus/Minus</option>
        </select>
        <select id="yMetricSelectV4">
            <option selected disabled>Select y-axis</option>
            <option value="next_pts_diff_from_baseline">Next PTS Difference from Baseline</option>
            <option value="next_fga_change">Next FGA Change</option>
        </select>
        <label class="toggle-option">
            <input type="checkbox" id="trendlineToggleV4" checked>
            Trendline
        </label>
     </div>
     <div id="vizual4"></div>

  </body>
  <script src="https://d3js.org/d3.v7.min.js"></script>  
  <script type="module" src="index.js"></script>  
</html>
