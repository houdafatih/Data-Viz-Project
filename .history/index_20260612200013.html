<!DOCTYPE html>
<html>
   <head>
    <meta charset="UTF-8"/>
    <title>Beyond The Box Score</title>
    <link rel="stylesheet" href="style.css" >
  </head> 
  <body>
     <h1>Beyond The Box Score : Exploring NBA Player Momentum from Game to Game</h1>
     
     <div class="selection">
        <select id="selectPlayer">
            <option selected disabled>Select a Player</option>
        </select>

        <select id="seasonSelect">
            <option selected disabled>Select a Season</option>
        </select>

        <select id="metricSelect">
            <option selected disabled>Select a metric</option>
            <option value="pts">Points</option>
            <option value="fga">FGA</option>
            <option value="min">Minutes</option>
            <option value="fg_pct">FG%</option>
            <option value="plus_minus">Plus/Minus</option>
        </select>
     </div>
     
     <h3>Visualization 1 — Season Momentum Timeline</h3>
     <div class="vizual1"></div>

     <h3>Visualization 2 — Next-Game Response View</h3>
     <div class="vizual2"></div>

     <h3>Visualization 3 — Hot/Cold Streak Explorer</h3>
     <div class="vizual3"></div>

     <h3>Visualization 4 — Context Impact View</h3>
     <div class="vizual4"></div>

  </body>
  <script src="https://d3js.org/d3.v7.min.js"></script>  
  <script type="module" src="index.js"></script>  
</html>
